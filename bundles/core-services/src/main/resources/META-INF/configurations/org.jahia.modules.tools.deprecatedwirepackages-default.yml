# global default configuration
# Structure: a map of provider bundle symbolic name -> list of deprecated package regex patterns.
# Each entry means: "packages matching these patterns, when provided by this bundle, are considered deprecated".
providers:
  org.apache.felix.framework:
    - "org\\.springframework(\\..*)?"
    - "org\\.eclipse\\.gemini(\\..*)?"
    - "org\\.apache\\.camel(\\..*)?"
    - "org\\.drools(\\..*)?"
    - "org\\.jbpm(\\..*)?"
    - "org\\.kie(\\..*)?"
    - "org\\.jgroups(\\..*)?"
    - "org\\.velocity(\\..*)?"
    - "com\\.extjs(\\..*)?"
    - "com\\.google\\.gwt(\\..*)?"
    - "com\\.jahia\\.ajax(\\..*)?"
  org.eclipse.gemini.blueprint.core:
    - "org\\.eclipse\\.gemini(\\..*)?"
  org.ahia.bundles.securityfilter:
    - "com\\.auth0\\.jwt(\\..*)?"
