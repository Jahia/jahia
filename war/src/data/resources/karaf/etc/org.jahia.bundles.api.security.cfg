# default configuration, can be edited

# Available profiles : default, compat (DEPRECATED), open, off
# If the 'security.profile' property is commented out or absent, the 'default' profile is used.
#   default  - Jahia standard security profile (recommended).
#   compat   - Compatibility/legacy profile (DEPRECATED, use 'default' instead).
#   open     - Relaxed security profile (less restrictive).
#   off      - Disables all Jahia-provided security profiles. The generated authorization file (org.jahia.bundles.api.authorization-default.yml) will be emptied.
#              Use this value when you want to supply your own complete authorization configuration via other supported Jahia mechanisms.
#              Note: when multiple YAML configuration files define the same scope name, their rules are additively merged.
security.profile=default

# Enable logging when a difference between legacy and new mode is detected
security.migrationReporting=false

# Enable legacy mode
security.legacyMode=false

# CORS filter
# Full documentation at https://tomcat.apache.org/tomcat-9.0-doc/config/filter.html#CORS_Filter
cors.allowed.origins=localhost
cors.support.credentials=true
cors.exposed.headers=
cors.allowed.headers=Origin,Accept,X-Requested-With,Content-Type,Access-Control-Request-Method,Access-Control-Request-Headers,CSRFTOKEN
cors.allowed.methods=GET,POST,HEAD,OPTIONS
cors.preflight.maxage=1800
cors.request.decorate=true

