     # Tolerated/controlled leaks — usage too widespread, no clean alternative yet:
     - "org\\.apache\\.tika\\.(?!exception|metadata)(.+)" # Allows only org.apache.tika, org.apache.tika.metadata, org.apache.tika.exception surface APIs, leaked from TextExtractionService
     - "org\\.drools\\.(?!core\\.spi(\\..*)?)(.+)" # Allows only org.drools.core.spi surface API, leaked from rule Module global objects
     - "org\\.quartz\\.(?!listeners)(.+)" # Allows only org.quartz and org.quartz.listeners surface API, leaked from SchedulerService
     - "org\\.apache\\.solr\\.client\\.solrj\\.(?!response)(.+)" # Leak from facet.tld tag lib
     - "org\\.apache\\.solr\\.(?!client|schema|util)(.+)" # Leak from facet.tld tag lib
     - "org\\.apache\\.lucene\\.(?!document)(.+)" # Leak from facet.tld tag lib
